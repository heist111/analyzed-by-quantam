<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Analysis Bets</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- BACKGROUND -->
<div class="dollar-bg-container"></div>

<h1>⚡ Quantum Analysis Bets</h1>

<!-- SEARCH -->
<div class="search-box" style="text-align:center; margin-bottom:15px;">
    <input type="text" id="teamSearch" placeholder="Search team...">
    <button onclick="searchTeamMatches()">Search</button>
</div>

<!-- SAFE MATCHES -->
<div id="safeMatches"></div>

<!-- TABS -->
<div class="tabs" style="text-align:center; margin-bottom:15px;">
    <button class="tab-btn" onclick="showTab('live')">Live Matches</button>
    <button class="tab-btn" onclick="showTab('upcoming')">Upcoming Matches</button>
</div>

<!-- MATCH DISPLAY -->
<div id="live" class="tab-content active"></div>
<div id="upcoming" class="tab-content"></div>

<!-- HISTORY -->
<h2 style="text-align:center;">✅ Correct Predictions (Last 7 Days)</h2>
<div id="history" style="text-align:center;"></div>

<!-- ================= KIMI AI (BOTTOM-RIGHT) ================= -->
<div id="kimi-box">
    <div id="kimi-header">KIMI 🤖</div>
    <div id="kimi-messages"></div>
    <input 
        type="text" 
        id="kimi-input" 
        placeholder="Ask or complain..." 
        onkeypress="handleKimi(event)">
</div>

<!-- SCRIPT -->
<script src="kimi_match_handler.js"></script>
<script src="script.js"></script>

</body>
</html>
